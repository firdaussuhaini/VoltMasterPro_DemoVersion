<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltMaster PRO v12.0 | Demo Version</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg:#020617; --card:#111827; --accent:#22c55e; --text:#94a3b8; --border:#334155; }
body{margin:0;font-family: Arial, sans-serif;background:var(--bg);color:white;padding-bottom:50px;}
header{text-align:center;padding:20px;background:#0f172a;border-bottom:3px solid var(--accent);}
.container{max-width:1000px;margin:auto;padding:10px;}
.card{background:var(--card);padding:15px;border-radius:12px;margin-top:15px;border:1px solid var(--border);}
h3{margin-top:0;color:var(--accent);font-size:1rem;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:10px;}
input,select{width:100%;padding:8px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:4px;box-sizing: border-box;font-size:0.85rem;}
button{width:100%;padding:15px;margin-top:15px;background:var(--accent);border:none;font-weight:bold;cursor:pointer;border-radius:4px;font-size:1rem;color:#020617;}
.result{white-space:pre-wrap;margin-top:20px;background:#000;padding:20px;display:none;border-radius:8px;font-family: 'Courier New', monospace;font-size:0.85rem;border:1px solid var(--accent);line-height:1.3;}
label{font-size:0.7rem;color:var(--text);display:block;margin-bottom:3px;}
.locked-section { opacity: 0.5; pointer-events: none; position: relative; }
.locked-badge { position: absolute; top: 5px; right: 10px; color: #ef4444; font-size: 0.6rem; font-weight: bold; border: 1px solid #ef4444; padding: 2px 5px; border-radius: 4px; }
</style>
</head>
<body>

<header>
    <h1>⚡ VoltMaster PRO v12.0</h1>
    <p style="font-size: 0.8rem; color: var(--accent);">DEMO MODE ACTIVE</p>
</header>

<div class="container">
    <div class="card">
        <h3>1. Circuit Inputs (Quantities)</h3>
        <div class="grid">
            <div><label>Lighting</label><input id="qL" value="10" type="number"></div>
            <div><label>Ceiling Fan</label><input id="qF" value="5" type="number"></div>
            <div><label>Exhaust Fan</label><input id="qEF" value="2" type="number"></div>
            <div><label>Socket Pts</label><input id="qS" value="12" type="number"></div>
        </div>
        <div class="grid">
            <div><label>Air-Cond</label><input id="qAC" value="2" type="number"></div>
            <div><label>Water Heater</label><input id="qWH" value="2" type="number"></div>
        </div>
    </div>

    <div class="card locked-section">
        <span class="locked-badge">PRO ONLY</span>
        <h3>2. Technical Specifications (Watts/HP)</h3>
        <div class="grid">
            <div><label>Light (Watts)</label><input value="15" readonly></div>
            <div><label>Fan (Watts)</label><input value="75" readonly></div>
            <div><label>Exhaust (Watts)</label><input value="40" readonly></div>
            <div><label>AC (Horsepower)</label><input value="1.5" readonly></div>
            <div><label>Heater (Watts)</label><input value="3000" readonly></div>
        </div>
    </div>

    <div class="card locked-section">
        <span class="locked-badge">PRO ONLY</span>
        <h3>3. Design Parameters</h3>
        <div class="grid">
            <div><label>Lights per Cct</label><input value="10" readonly></div>
            <div><label>Fans per Cct</label><input value="10" readonly></div>
            <div><label>Exhaust per Cct</label><input value="10" readonly></div>
            <div><label>Length (m)</label><input value="25" readonly></div>
        </div>
    </div>

    <div class="card">
        <button onclick="contactWA()" style="background:var(--accent);">⚡ GENERATE COMPLIANCE REPORT</button>
        
        <button onclick="contactWA()" style="background:#25D366; color:white; margin-top:10px;">
            📱 TO GET FULL ACCESS PLEASE CLICK THIS BUTTON
        </button>
        
        <button onclick="contactWA()" style="background:#334155; color:white; opacity:0.7; margin-top:10px;">
            📄 EXPORT PDF (LOCKED)
        </button>
    </div>
</div>

<script>
function contactWA() {
    const phone = "60194215250";
    const message = encodeURIComponent("hello, want to get full access VoltMasterPro");
    window.location.href = `https://wa.me/${phone}?text=${message}`;
}
</script>

</body>
</html>
